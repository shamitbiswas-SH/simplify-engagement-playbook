<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Events & Webinars | Simplify Group</title>
<style>
  :root{
    --ink:#221F20; --green:#2D8C4E; --forest:#1B6B38; --leaf:#5BB574;
    --mint:#A8DDB5; --palemint:#DFF2E3; --charcoal:#4A4547; --silver:#EAEAEB;
    --warn-bg:#FFF6E0; --warn-ink:#8A5A00; --warn-edge:#E3B23C;
    --due-bg:#FDECEA; --due-ink:#9B2C1F; --due-edge:#D9534F;
    --web:#105299; --web-tint:#E7F0FA; --web-border:#B9D2EC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important} }
  body{font-family:"Proxima Nova", Arial, Helvetica, sans-serif;color:var(--ink);background:#fff;line-height:1.45}
  button{font-family:inherit;cursor:pointer}

  header{background:var(--ink);color:#fff;padding:16px 28px}
  .hd-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;max-width:1220px;margin:0 auto}
  .hd-mark{width:12px;height:12px;background:var(--green);transform:rotate(45deg);flex:none}
  h1{font-size:20px;font-weight:700;cursor:pointer}
  .hd-sub{color:var(--mint);font-size:12.5px}
  .hd-clock{margin-left:auto;text-align:right;font-size:12px;color:var(--silver);line-height:1.35}
  .hd-clock b{display:block;font-size:15px;color:#fff;font-variant-numeric:tabular-nums}

  .wrap{max-width:1220px;margin:0 auto;padding:0 28px}

  .homebar{background:var(--palemint);border-bottom:1px solid var(--silver);padding:14px 28px}
  .homebar-inner{max-width:1220px;margin:0 auto;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .seg{display:flex;border:1px solid var(--silver);border-radius:8px;overflow:hidden;background:#fff}
  .seg button{font-size:13px;font-weight:700;padding:9px 16px;border:none;background:#fff;color:var(--charcoal)}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .seg button.w[aria-pressed="true"]{background:var(--web)}
  .legend{margin-left:auto;display:flex;gap:14px;font-size:12px;color:var(--charcoal)}
  .legend span::before{content:"";display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .legend .le::before{background:var(--green)} .legend .lw::before{background:var(--web)}

  .alerts{margin-top:16px;border:1px solid var(--warn-edge);border-left:5px solid var(--warn-edge);background:var(--warn-bg);border-radius:8px;padding:12px 16px}
  .alerts h3{font-size:12.5px;color:var(--warn-ink);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
  .alert-item{display:flex;gap:10px;align-items:baseline;font-size:13px;padding:3px 0;flex-wrap:wrap;cursor:pointer}
  .alert-item:hover .a-task{text-decoration:underline}
  .alert-item .when{font-weight:700;white-space:nowrap}
  .alert-item .when.over{color:var(--due-ink)}
  .alert-item .when.soon{color:var(--warn-ink)}
  .alert-item .ev{color:var(--charcoal);font-size:12px}

  .sect{margin-top:26px}
  .sect h2{font-size:13px;letter-spacing:.8px;text-transform:uppercase;color:var(--charcoal);margin-bottom:12px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .ecard{border:1px solid var(--silver);border-top:5px solid var(--green);border-radius:10px;background:#fff;padding:16px 18px;cursor:pointer;transition:box-shadow .15s, transform .15s;display:flex;flex-direction:column;gap:8px}
  .ecard:hover{box-shadow:0 4px 14px rgba(34,31,32,.12);transform:translateY(-2px)}
  .ecard.webinar{border-top-color:var(--web)}
  .ecard.completed{background:#F7F7F8;border-top-color:#C9C9CC;color:var(--charcoal)}
  .ecard.completed:hover{transform:none;box-shadow:none}
  .e-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .e-fmt{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;border-radius:4px;padding:2px 7px;background:var(--palemint);color:var(--forest)}
  .ecard.webinar .e-fmt{background:var(--web-tint);color:var(--web)}
  .ecard.completed .e-fmt{background:var(--silver);color:var(--charcoal)}
  .e-status{margin-left:auto;font-size:12px;font-weight:700;text-align:right}
  .e-status.live{color:var(--due-ink)}
  .e-status.up{color:var(--forest)}
  .ecard.webinar .e-status.up{color:var(--web)}
  .e-status.done{color:var(--charcoal)}
  .e-status.wrap{color:var(--warn-ink)}
  .e-name{font-size:16.5px;font-weight:700;line-height:1.25}
  .e-when{font-size:12.5px;color:var(--charcoal)}
  .e-foot{display:flex;align-items:center;gap:10px;margin-top:2px}
  .e-prog{font-size:11.5px;color:var(--charcoal);white-space:nowrap}
  .bar{flex:1;height:6px;border-radius:3px;background:var(--silver);overflow:hidden}
  .bar i{display:block;height:100%;background:var(--green)}
  .ecard.webinar .bar i{background:var(--web)}
  .ecard.completed .bar i{background:#B9B9BC}
  .e-alert{font-size:11px;font-weight:700;border-radius:5px;padding:2px 8px;background:var(--due-bg);color:var(--due-ink);border:1px solid var(--due-edge);white-space:nowrap}
  .e-soon{font-size:11px;font-weight:700;border-radius:5px;padding:2px 8px;background:var(--warn-bg);color:var(--warn-ink);border:1px solid var(--warn-edge);white-space:nowrap}
  .e-open{font-size:12px;font-weight:700;color:var(--forest)}
  .ecard.webinar .e-open{color:var(--web)}
  .ecard.completed .e-open{color:var(--charcoal)}

  .evbar{background:var(--palemint);border-bottom:1px solid var(--silver);padding:14px 28px}
  .evbar-inner{max-width:1220px;margin:0 auto}
  .backbtn{font-size:13px;font-weight:700;background:#fff;border:1px solid var(--silver);border-radius:6px;padding:7px 13px;color:var(--ink)}
  .backbtn:hover{border-color:var(--green);color:var(--forest)}
  .ev-head{display:flex;gap:14px;align-items:baseline;flex-wrap:wrap;margin-top:10px}
  .ev-head h2{font-size:21px;font-weight:700}
  .ev-meta{font-size:13px;color:var(--charcoal)}
  .ev-count{font-size:13px;font-weight:700}
  .ev-count.up{color:var(--forest)} .ev-count.live{color:var(--due-ink)} .ev-count.done{color:var(--charcoal)} .ev-count.wrap{color:var(--warn-ink)}
  .ev-progress{display:flex;align-items:center;gap:10px;margin-top:10px;max-width:430px;font-size:12px;color:var(--charcoal)}
  .note{margin-top:10px;font-size:12.5px;color:var(--charcoal);background:#fff;border:1px solid var(--silver);border-radius:6px;padding:7px 12px;display:inline-block}
  .note.wrapnote{border-color:var(--warn-edge);background:var(--warn-bg);color:var(--warn-ink)}
  .ev-tools{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-top:12px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--charcoal)}
  select,input[type=search]{font-family:inherit;font-size:13.5px;color:var(--ink);background:#fff;border:1px solid var(--silver);border-radius:6px;padding:8px 10px;min-width:170px}
  select:focus,input:focus,button:focus-visible{outline:2px solid var(--green);outline-offset:1px}
  .btn{font-size:12.5px;font-weight:700;background:var(--green);color:#fff;border:none;border-radius:6px;padding:9px 14px}
  .btn:hover{background:var(--forest)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .chip{font-size:11.5px;font-weight:600;border:1px solid var(--silver);border-radius:999px;background:#fff;color:var(--charcoal);padding:4px 11px}
  .chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}

  .phase{margin-top:24px}
  .phase-h{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .phase-num{flex:none;width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .phase.webinar .phase-num{background:var(--web)}
  .phase-h h3{font-size:15px;font-weight:700}
  .phase-prog{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--charcoal)}
  .phase-prog .bar{width:110px;flex:none}

  .grid{border:1px solid var(--silver);border-radius:8px;overflow:hidden}
  .row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-top:1px solid var(--silver);background:#fff;border-left:4px solid var(--green);cursor:pointer}
  .row:first-child{border-top:none}
  .row.webinar{border-left-color:var(--web)}
  .row.done .t-name{text-decoration:line-through;color:var(--charcoal)}
  .t-team{font-size:10px;border:1px solid var(--mint);color:var(--forest);border-radius:8px;padding:0 6px;white-space:nowrap}
  .row.past{background:#FAFAFA;color:var(--charcoal);border-left-color:#C9C9CC}
  .row input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);flex:none;cursor:pointer}
  .row.webinar input[type=checkbox]{accent-color:var(--web)}
  .t-name{font-size:13.5px;font-weight:600;flex:1 1 280px;min-width:180px}
  .t-due{font-size:11.5px;font-weight:700;white-space:nowrap;border-radius:5px;padding:3px 8px;background:var(--ink);color:#fff;font-variant-numeric:tabular-nums}
  .t-due.soon{background:var(--warn-bg);color:var(--warn-ink);border:1px solid var(--warn-edge)}
  .t-due.over{background:var(--due-bg);color:var(--due-ink);border:1px solid var(--due-edge)}
  .t-due.plain{background:#fff;color:var(--charcoal);border:1px solid var(--silver)}
  .t-due.past{background:var(--silver);color:var(--charcoal)}
  .t-owner{font-size:11px;font-weight:700;border-radius:5px;padding:3px 8px;background:var(--palemint);color:var(--forest);border:1px solid var(--mint);white-space:nowrap}
  .row.webinar .t-owner{background:var(--web-tint);color:var(--web);border-color:var(--web-border)}
  .row.past .t-owner{background:var(--silver);color:var(--charcoal);border-color:#D8D8DA}
  .t-gflag{flex:none;font-size:12px;color:var(--warn-ink)}
  .detail{display:none;background:#FBFBFB;border-top:1px dashed var(--silver);padding:10px 16px 12px 42px;font-size:12.5px;color:var(--charcoal);border-left:4px solid var(--green)}
  .detail.webinar{border-left-color:var(--web)}
  .detail.past{border-left-color:#C9C9CC}
  .detail.open{display:block}
  .detail b{color:var(--ink)}
  .detail .gotcha{margin-top:8px;background:var(--warn-bg);border-left:3px solid var(--warn-edge);color:var(--warn-ink);padding:7px 11px;border-radius:0 6px 6px 0}

  .state{max-width:760px;margin:60px auto;padding:0 28px;font-size:14px;color:var(--charcoal)}
  .state h2{font-size:18px;color:var(--ink);margin-bottom:10px}
  .state code{background:var(--palemint);padding:2px 6px;border-radius:4px;font-size:12.5px}
  .hidden{display:none}
  footer{height:80px}

  @media print{
    header{background:#fff;color:var(--ink);border-bottom:3px solid var(--green);padding:10px 0}
    .hd-sub{color:var(--charcoal)} .hd-clock,.homebar,.ev-tools,.chips,.backbtn,.alerts{display:none!important}
    .ecard:hover{box-shadow:none;transform:none}
    .detail{display:block!important}
    .row{cursor:default}
  }
  @media (max-width:680px){
    header,.homebar,.evbar{padding-left:16px;padding-right:16px}
    .wrap{padding:0 16px}
    select,input[type=search]{min-width:100%;width:100%}
    .field{width:100%}
    .legend{display:none}
  }
</style>
</head>
<body>

<header>
  <div class="hd-row">
    <span class="hd-mark" aria-hidden="true"></span>
    <h1 id="home-link" title="Back to all events and webinars">Events &amp; Webinars</h1>
    <span class="hd-sub">Every task, deadline and gotcha for each event and webinar</span>
    <div class="hd-clock"><b id="clock">--:--:--</b><span id="today"></span></div>
  </div>
</header>

<div id="app"></div>

<div class="state hidden" id="error-state">
  <h2>Could not load the sheet</h2>
  <p id="error-detail"></p>
  <p>Check the sheet is published to web, link sharing is on, and the tabs are named <code>Playbook</code> and <code>Events</code>.</p>
</div>
<div class="state" id="loading-state"><h2>Loading playbook…</h2></div>
<footer></footer>

<script>
/* ================= CONFIG ================= */
const SHEET_ID   = "1Wf1DJYOSA_sVNFW9jtQa0LtoImuNR3qusyCK9mfVU94";
const SHEET_TAB  = "Playbook";
const EVENTS_TAB = "Events";
/* ========================================== */

const COLS = {org:"Organizer", type:"Engagement Type", phase:"Phase", task:"Task",
  req:"Requirement & Specs", owner:"Owner", lead:"Lead Time",
  deps:"Dependencies", contact:"External Contact", gotcha:"Gotchas / Notes", event:"Event", status:"Status"};

let DATA = [], EVENTS = {}, fmt = "";
let evOwner = "", evQuery = "", evPhase = "";
let DONE = {};
try { DONE = JSON.parse(localStorage.getItem("playbook-done") || "{}"); } catch(e) { DONE = {}; }

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const DAY = 86400000;
const today0 = () => { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); };
const fmtDate = d => d ? d.toLocaleDateString("en-IN", {day:"numeric", month:"short"}) : "";
const fmtDateY = d => d ? d.toLocaleDateString("en-IN", {day:"numeric", month:"short", year:"numeric"}) : "";

function phaseLabel(p){ return String(p||"").replace(/^\d+\s*-\s*/, ""); }
function phaseNum(p){ const m = String(p||"").match(/^(\d+)/); return m ? m[1] : "•"; }
function isWebinarType(t){ return /webinar/i.test(t || ""); }
function keyOf(r){ return (r[COLS.event]||"") + "|" + (r[COLS.org]||"") + "|" + (r[COLS.task]||""); }
function sheetDone(r){ return /^done/i.test(String(r[COLS.status]||"")); }
function isDone(r){ return sheetDone(r) || !!DONE[keyOf(r)]; }
function shortName(name){ const i = name.indexOf(": "); return i >= 0 ? name.slice(i+2) : name; }

function parseGvizDate(v){
  if(!v) return null;
  const s = String(v);
  let m = s.match(/Date\((\d+),(\d+),(\d+)/);
  if(m) return new Date(+m[1], +m[2], +m[3]);
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(s);
  return isNaN(d) ? null : new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function leadOffset(lead){
  const s = String(lead||"");
  if(/event day/i.test(s)) return {kind:"event"};
  const m = s.match(/T\s*([+-])\s*(\d+)\s*(wks?|weeks?|days?|d\b|mos?|months?)?/i);
  if(!m) return null;
  const n = +m[2]; const u = (m[3]||"").toLowerCase();
  const days = u.startsWith("w") ? n*7 : u.startsWith("mo") ? n*30 : n;
  return {kind:"rel", sign: m[1]==="-" ? -1 : 1, days, n, unit: u.startsWith("w") ? "wk" : u.startsWith("mo") ? "mo" : "day"};
}

function humanLead(lead){
  const s = String(lead||"").trim();
  if(!s) return "";
  const off = leadOffset(s);
  if(!off) return s;
  if(off.kind === "event") return "During event days";
  const multi = (s.match(/T\s*[+-]/gi)||[]).length > 1;
  if(multi) return s;
  const unitWord = off.unit === "wk" ? (off.n===1 ? "week" : "weeks") : off.unit === "mo" ? (off.n===1 ? "month" : "months") : (off.n===1 ? "day" : "days");
  return off.n + " " + unitWord + (off.sign < 0 ? " before event" : " after event");
}

function dueDate(r){
  const ev = EVENTS[r[COLS.event]];
  if(!ev || !ev.start) return null;
  const off = leadOffset(r[COLS.lead]);
  if(!off) return null;
  if(off.kind === "event") return ev.start;
  const base = off.sign < 0 ? ev.start : (ev.end || ev.start);
  return new Date(base.getTime() + off.sign * off.days * DAY);
}

function eventState(name){
  const ev = EVENTS[name];
  const t = today0();
  if(!ev) return {label:"No date set", cls:"up", past:false, wrapup:false, dated:false};
  if((ev.status||"").toLowerCase().startsWith("complete"))
    return {label:"Completed", cls:"done", past:true, wrapup:false, dated:!!ev.start};
  if(ev.start && ev.start <= t && (ev.end||ev.start) >= t)
    return {label:"LIVE NOW", cls:"live", past:false, wrapup:false, dated:true};
  if(ev.start && (ev.end||ev.start) < t)
    return {label:"Wrap-up", cls:"wrap", past:false, wrapup:true, dated:true};
  if(ev.start){
    const d = Math.round((ev.start - t)/DAY);
    return {label: d + " day" + (d===1?"":"s") + " to go", cls:"up", past:false, wrapup:false, dated:true, days:d};
  }
  return {label: ev.status || "Date TBC", cls:"up", past:false, wrapup:false, dated:false};
}

function taskRelevant(r, st){
  /* during wrap-up only post-event tasks stay live */
  if(!st.wrapup) return true;
  const off = leadOffset(r[COLS.lead]);
  return !!(off && off.kind === "rel" && off.sign > 0);
}

async function fetchTab(tab){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(tab)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}")+1));
  const headers = json.table.cols.map(c => (c.label || "").trim());
  return (json.table.rows || []).map(r => {
    const o = {};
    headers.forEach((h,i)=>{ o[h] = r.c && r.c[i] && r.c[i].v != null ? String(r.c[i].v).trim() : ""; });
    return o;
  });
}

async function load(){
  try{
    DATA = (await fetchTab(SHEET_TAB)).filter(o => o[COLS.task]);
    $("loading-state").classList.add("hidden");
  }catch(e){
    $("loading-state").classList.add("hidden");
    $("error-state").classList.remove("hidden");
    $("error-detail").textContent = e.message;
    return;
  }
  try{
    (await fetchTab(EVENTS_TAB)).forEach(r => {
      if(r["Event"]) EVENTS[r["Event"]] = {
        start: parseGvizDate(r["Start Date"]), end: parseGvizDate(r["End Date"]),
        location: r["Location"]||"", status: r["Status"]||"", series: (r["Series"]||"").trim() };
    });
  }catch(e){ /* Events tab optional */ }
  route();
}

/* ---------- model ---------- */
function eventList(){
  const names = new Set(Object.keys(EVENTS));
  DATA.forEach(r => { if(r[COLS.event] && r[COLS.event] !== "Any") names.add(r[COLS.event]); });
  return [...names];
}
function rowsForEvent(name){ return DATA.filter(r => r[COLS.event] === name); }
function templateGroups(){
  const g = {};
  DATA.filter(r => r[COLS.event] === "Any").forEach(r => {
    const k = r[COLS.org] + "|" + r[COLS.type];
    (g[k] ??= []).push(r);
  });
  return g;
}
function seriesOf(name){ return (EVENTS[name] && EVENTS[name].series) || ""; }
function seriesMap(){
  const m = {};
  eventList().forEach(n => { const s = seriesOf(n); if(s) (m[s] ??= []).push(n); });
  return m;
}
function evFormat(rows){ return rows.some(r => isWebinarType(r[COLS.type])) ? "webinar" : "event"; }
function progress(rows){
  const total = rows.length;
  const done = rows.filter(r => isDone(r)).length;
  return {done, total, pct: total ? Math.round(100*done/total) : 0};
}
function dueStats(name, rows){
  const st = eventState(name); const t = today0();
  let over = 0, soon = 0;
  if(st.past) return {over, soon};
  rows.forEach(r => {
    if(isDone(r) || !taskRelevant(r, st)) return;
    const d = dueDate(r); if(!d) return;
    const diff = Math.round((d - t)/DAY);
    if(diff < 0) over++; else if(diff <= 7) soon++;
  });
  return {over, soon};
}
function rankState(st){ return st.cls==="live" ? 0 : (!st.past && !st.wrapup) ? 1 : st.wrapup ? 2 : 3; }

/* ---------- routing ---------- */
function goHome(){ location.hash = ""; }
function goEvent(name){ location.hash = "ev=" + encodeURIComponent(name); }
function goSeries(name){ location.hash = "series=" + encodeURIComponent(name); }
function goTpl(key){ location.hash = "tpl=" + encodeURIComponent(key); }
function route(){
  evOwner = ""; evQuery = ""; evPhase = "";
  const h = location.hash.replace(/^#/, "");
  if(h.startsWith("ev=")) renderEvent(decodeURIComponent(h.slice(3)), false);
  else if(h.startsWith("tpl=")) renderEvent(decodeURIComponent(h.slice(4)), true);
  else if(h.startsWith("series=")) renderSeries(decodeURIComponent(h.slice(7)));
  else renderHome();
  window.scrollTo(0,0);
}
window.addEventListener("hashchange", route);
$("home-link").addEventListener("click", goHome);

/* ---------- shared card builders ---------- */
function eventCard(name){
  const rows = rowsForEvent(name);
  const f = evFormat(rows);
  const st = eventState(name);
  const ev = EVENTS[name] || {};
  const pr = progress(rows);
  const ds = dueStats(name, rows);
  const when = ev.start ? (fmtDateY(ev.start) + (ev.end && +ev.end !== +ev.start ? " to " + fmtDateY(ev.end) : "")) : "Date not set";
  return `<div class="ecard ${f==='webinar'?'webinar':''} ${st.past?'completed':''}" data-ev="${esc(name)}" role="button" tabindex="0">
    <div class="e-top">
      <span class="e-fmt">${f==='webinar' ? 'Webinar' : 'In-Person Event'}</span>
      <span class="e-status ${st.cls}">${esc(st.label)}</span>
    </div>
    <div class="e-name">${esc(name)}</div>
    <div class="e-when">${esc(when)}${ev.location ? " • " + esc(ev.location) : ""}</div>
    <div class="e-foot">
      <span class="e-prog">${pr.done}/${pr.total} done</span>
      <span class="bar"><i style="width:${pr.pct}%"></i></span>
      ${ds.over ? `<span class="e-alert">${ds.over} overdue</span>` : ds.soon ? `<span class="e-soon">${ds.soon} due soon</span>` : ""}
    </div>
    <div class="e-open">${st.past ? "View record" : "Open checklist"} &rsaquo;</div>
  </div>`;
}

function seriesCard(sname, members){
  const allRows = members.flatMap(rowsForEvent);
  const f = evFormat(allRows);
  const pr = progress(allRows);
  let over = 0, soon = 0, completedN = 0;
  members.forEach(n => {
    const ds = dueStats(n, rowsForEvent(n));
    over += ds.over; soon += ds.soon;
    if(eventState(n).past) completedN++;
  });
  const t = today0();
  const upcoming = members.filter(n => { const e = EVENTS[n]; const st = eventState(n); return e && e.start && !st.past && !st.wrapup && e.start >= t; })
    .sort((a,b)=>EVENTS[a].start - EVENTS[b].start);
  const live = members.find(n => eventState(n).cls === "live");
  let statusHTML, cls;
  if(live){ statusHTML = "LIVE: " + esc(shortName(live)); cls = "live"; }
  else if(upcoming.length){
    const n = upcoming[0]; const d = Math.round((EVENTS[n].start - t)/DAY);
    statusHTML = "Next: " + esc(shortName(n)) + " • in " + d + "d"; cls = "up";
  } else if(completedN < members.length){ statusHTML = "Wrap-up"; cls = "wrap"; }
  else { statusHTML = "Completed"; cls = "done"; }
  const dates = members.map(n=>EVENTS[n]&&EVENTS[n].start).filter(Boolean).sort((a,b)=>a-b);
  const span = dates.length ? fmtDate(dates[0]) + " to " + fmtDateY(dates[dates.length-1]) : "";
  return `<div class="ecard ${f==='webinar'?'webinar':''} ${cls==='done'?'completed':''}" data-series="${esc(sname)}" role="button" tabindex="0">
    <div class="e-top">
      <span class="e-fmt">${f==='webinar' ? 'Webinar Series' : 'Event Series'}</span>
      <span class="e-status ${cls}">${statusHTML}</span>
    </div>
    <div class="e-name">${esc(sname)}</div>
    <div class="e-when">${members.length} webinars${span ? " • " + esc(span) : ""} • ${completedN} completed</div>
    <div class="e-foot">
      <span class="e-prog">${pr.done}/${pr.total} done</span>
      <span class="bar"><i style="width:${pr.pct}%"></i></span>
      ${over ? `<span class="e-alert">${over} overdue</span>` : soon ? `<span class="e-soon">${soon} due soon</span>` : ""}
    </div>
    <div class="e-open">Open series &rsaquo;</div>
  </div>`;
}

function wireCards(scope){
  scope.querySelectorAll(".ecard[data-ev]").forEach(c=>{
    const open = ()=>goEvent(c.dataset.ev);
    c.addEventListener("click", open);
    c.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" ") {e.preventDefault(); open();} });
  });
  scope.querySelectorAll(".ecard[data-series]").forEach(c=>{
    const open = ()=>goSeries(c.dataset.series);
    c.addEventListener("click", open);
    c.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" ") {e.preventDefault(); open();} });
  });
  scope.querySelectorAll(".ecard[data-tpl]").forEach(c=>{
    const open = ()=>goTpl(c.dataset.tpl);
    c.addEventListener("click", open);
    c.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" ") {e.preventDefault(); open();} });
  });
  scope.querySelectorAll(".alert-item").forEach(a=>{
    a.addEventListener("click", ()=>goEvent(a.dataset.ev));
  });
}

function alertsHTML(eventNames){
  const t = today0(); const items = [];
  eventNames.forEach(name => {
    const st = eventState(name); if(st.past) return;
    rowsForEvent(name).forEach(r => {
      if(isDone(r) || !taskRelevant(r, st)) return;
      const d = dueDate(r); if(!d) return;
      const diff = Math.round((d - t)/DAY);
      if(diff <= 7) items.push({name, r, d, diff});
    });
  });
  items.sort((a,b)=>a.d-b.d);
  if(!items.length) return "";
  return `<div class="alerts">
    <h3>Needs attention • next 7 days${items.length>8 ? " (showing 8 of "+items.length+")" : ""}</h3>` +
    items.slice(0,8).map(({name,r,d,diff}) => `<div class="alert-item" data-ev="${esc(name)}">
      <span class="when ${diff<0?'over':'soon'}">${diff<0 ? "OVERDUE • was "+fmtDate(d) : diff===0 ? "DUE TODAY" : "Due in "+diff+"d • "+fmtDate(d)}</span>
      <span class="a-task">${esc(r[COLS.task])}</span>
      <span class="ev">${esc(name)} • ${esc(r[COLS.owner]||"")}</span>
    </div>`).join("") + `</div>`;
}

/* ---------- HOME ---------- */
function renderHome(){
  const app = $("app");
  const smap = seriesMap();
  const standalone = eventList().filter(n => !seriesOf(n));
  const tpls = templateGroups();

  const entries = [];
  standalone.forEach(n => {
    const st = eventState(n);
    const d = EVENTS[n] && EVENTS[n].start ? EVENTS[n].start : null;
    entries.push({kind:"ev", key:n, rank: rankState(st), date: d, fmt: evFormat(rowsForEvent(n))});
  });
  Object.entries(smap).forEach(([s, members]) => {
    const t = today0();
    const up = members.map(n=>EVENTS[n]&&EVENTS[n].start).filter(d=>d&&d>=t).sort((a,b)=>a-b);
    const ranks = members.map(n=>rankState(eventState(n)));
    entries.push({kind:"series", key:s, rank: Math.min(...ranks), date: up[0]||null, fmt: evFormat(members.flatMap(rowsForEvent))});
  });
  entries.sort((a,b)=>{
    if(a.rank !== b.rank) return a.rank - b.rank;
    if(a.date && b.date) return a.date - b.date;
    if(a.date) return -1; if(b.date) return 1;
    return a.key.localeCompare(b.key);
  });
  const visible = entries.filter(e => !fmt || e.fmt === fmt);

  const cardsHTML = visible.map(e => e.kind === "series" ? seriesCard(e.key, smap[e.key]) : eventCard(e.key)).join("");

  const tplKeys = Object.keys(tpls).filter(k => {
    if(!fmt) return true;
    return fmt === (isWebinarType(k.split("|")[1]) ? "webinar" : "event");
  }).sort();
  const tplHTML = tplKeys.map(k => {
    const [org, type] = k.split("|");
    const f = isWebinarType(type) ? "webinar" : "event";
    return `<div class="ecard ${f==='webinar'?'webinar':''}" data-tpl="${esc(k)}" role="button" tabindex="0">
      <div class="e-top"><span class="e-fmt">${f==='webinar' ? 'Webinar' : 'In-Person Event'} • Template</span></div>
      <div class="e-name">${esc(type)}</div>
      <div class="e-when">${esc(org)} • reusable playbook • ${tpls[k].length} tasks</div>
      <div class="e-open">Open playbook &rsaquo;</div>
    </div>`;
  }).join("");

  const allEventNames = eventList();
  app.innerHTML = `
    <div class="homebar"><div class="homebar-inner">
      <div class="seg" role="group" aria-label="Format">
        <button type="button" data-fmt="" aria-pressed="${fmt===''}">All</button>
        <button type="button" data-fmt="event" aria-pressed="${fmt==='event'}">In-Person Events</button>
        <button type="button" class="w" data-fmt="webinar" aria-pressed="${fmt==='webinar'}">Webinars</button>
      </div>
      <span class="legend"><span class="le">In-person event</span><span class="lw">Webinar</span></span>
    </div></div>
    <div class="wrap">
      ${alertsHTML(allEventNames)}
      <div class="sect"><h2>Events &amp; Webinars</h2><div class="cards">${cardsHTML || "<p style='font-size:13px;color:var(--charcoal)'>Nothing in this view.</p>"}</div></div>
      ${tplHTML ? `<div class="sect"><h2>Evergreen playbooks (apply to any event)</h2><div class="cards">${tplHTML}</div></div>` : ""}
    </div>`;

  app.querySelectorAll(".homebar .seg button").forEach(b=>{
    b.addEventListener("click", ()=>{ fmt = b.dataset.fmt; renderHome(); });
  });
  wireCards(app);
}

/* ---------- SERIES ---------- */
function renderSeries(sname){
  const app = $("app");
  const members = (seriesMap()[sname] || []).sort((a,b)=>{
    const ea = EVENTS[a], eb = EVENTS[b];
    if(ea?.start && eb?.start) return ea.start - eb.start;
    return a.localeCompare(b);
  });
  if(!members.length){
    app.innerHTML = `<div class="wrap"><div class="state"><h2>No webinars found in this series</h2><p>Add rows to the <code>Events</code> tab with Series set to "${esc(sname)}".</p><p style="margin-top:10px"><button class="backbtn" onclick="location.hash=''">&lsaquo; All events &amp; webinars</button></p></div></div>`;
    return;
  }
  const allRows = members.flatMap(rowsForEvent);
  const pr = progress(allRows);
  const f = evFormat(allRows);
  app.innerHTML = `
    <div class="evbar"><div class="evbar-inner">
      <button class="backbtn" id="back">&lsaquo; All events &amp; webinars</button>
      <div class="ev-head">
        <h2>${esc(sname)}</h2>
        <span class="ev-meta">${members.length} webinars • paid HPA Pulse program</span>
      </div>
      <div class="ev-progress">${pr.done}/${pr.total} done across the series<span class="bar"><i style="width:${pr.pct}%"></i></span>${pr.pct}%</div>
    </div></div>
    <div class="wrap">
      ${alertsHTML(members)}
      <div class="sect"><h2>Webinars in this series</h2><div class="cards">${members.map(eventCard).join("")}</div></div>
    </div>`;
  $("back").addEventListener("click", goHome);
  wireCards(app);
}

/* ---------- EVENT DETAIL ---------- */
function dueChip(r, st){
  const lead = humanLead(r[COLS.lead]);
  if(st.past) return lead ? `<span class="t-due past">${esc(lead)}</span>` : "";
  if(st.wrapup && !taskRelevant(r, st)) return `<span class="t-due past">Pre-event (closed)</span>`;
  const due = dueDate(r);
  if(!due) return lead ? `<span class="t-due plain">${esc(lead)}</span>` : "";
  const t = today0(); const diff = Math.round((due - t)/DAY);
  if(isDone(r)) return `<span class="t-due plain">${fmtDate(due)}</span>`;
  if(diff < 0) return `<span class="t-due over">Overdue • was ${fmtDate(due)}</span>`;
  if(diff === 0) return `<span class="t-due over">Due TODAY</span>`;
  if(diff <= 7) return `<span class="t-due soon">Due in ${diff}d • ${fmtDate(due)}</span>`;
  return `<span class="t-due">Due ${fmtDate(due)} • in ${diff}d</span>`;
}

function renderEvent(name, isTpl){
  const app = $("app");
  let rows, title, sub, st, f, backTo = null;
  if(isTpl){
    const all = templateGroups();
    rows = all[name] || [];
    const parts = name.split("|");
    title = parts[1] || name; sub = (parts[0]||"") + " • reusable playbook";
    st = {label:"Template", cls:"up", past:false, wrapup:false, dated:false};
    f = isWebinarType(parts[1]) ? "webinar" : "event";
  } else {
    rows = rowsForEvent(name);
    title = name;
    const ev = EVENTS[name] || {};
    st = eventState(name);
    sub = (ev.start ? fmtDateY(ev.start) + (ev.end && +ev.end !== +ev.start ? " to " + fmtDateY(ev.end) : "") : "Date not set") + (ev.location ? " • " + ev.location : "");
    f = evFormat(rows);
    backTo = seriesOf(name) || null;
  }
  if(!rows.length){
    app.innerHTML = `<div class="wrap"><div class="state"><h2>No tasks found here yet</h2><p>Add rows to the <code>Playbook</code> tab with Event set to "${esc(name)}".</p><p style="margin-top:10px"><button class="backbtn" onclick="location.hash=''">&lsaquo; All events &amp; webinars</button></p></div></div>`;
    return;
  }

  const filteredRows = rows.filter(r =>
    (!evOwner || r[COLS.owner]===evOwner) &&
    (!evPhase || r[COLS.phase]===evPhase) &&
    (!evQuery || Object.values(r).join(" ").toLowerCase().includes(evQuery))
  );
  const pr = progress(rows);
  const owners = [...new Set(rows.map(r=>r[COLS.owner]).filter(Boolean))].sort();
  const phases = [...new Set(rows.map(r=>r[COLS.phase]).filter(Boolean))].sort();

  const groups = {};
  filteredRows.forEach(r => { (groups[r[COLS.phase]||"Other"] ??= []).push(r); });

  const boardHTML = Object.keys(groups).sort().map(p => {
    const g = groups[p];
    const d = g.filter(r=>isDone(r)).length;
    return `<section class="phase ${f==='webinar'?'webinar':''}">
      <div class="phase-h"><span class="phase-num">${esc(phaseNum(p))}</span><h3>${esc(phaseLabel(p))}</h3>
      <span class="phase-prog">${d}/${g.length}<span class="bar"><i style="width:${g.length?Math.round(100*d/g.length):0}%"></i></span></span></div>
      <div class="grid">` + g.map(r => {
        const k = keyOf(r), team = sheetDone(r), done = team || !!DONE[k];
        const locked = st.past || (st.wrapup && !taskRelevant(r, st));
        const id = "d_" + Math.random().toString(36).slice(2,9);
        return `<div class="row ${f==='webinar'?'webinar':''} ${done?'done':''} ${locked?'past':''}" data-detail="${id}">
          ${locked ? "" : team ? `<input type="checkbox" checked disabled aria-label="Done (team)" title="Marked Done in the sheet — visible to everyone">` : `<input type="checkbox" data-key="${esc(k)}" ${done?'checked':''} aria-label="Mark done">`}
          ${team ? '<span class="t-team" title="Done in the sheet — shared with the whole team">team</span>' : ''}
          <span class="t-name">${esc(r[COLS.task])}</span>
          ${r[COLS.gotcha] ? '<span class="t-gflag" title="Has a gotcha">&#9888;</span>' : ''}
          ${dueChip(r, st)}
          ${r[COLS.owner] ? `<span class="t-owner">${esc(r[COLS.owner])}</span>` : ""}
        </div>
        <div class="detail ${f==='webinar'?'webinar':''} ${locked?'past':''}" id="${id}">
          ${r[COLS.req] ? `<div>${esc(r[COLS.req])}</div>` : ""}
          <div style="margin-top:6px">
            ${r[COLS.lead] ? `<b>Timing:</b> ${esc(humanLead(r[COLS.lead]))} &nbsp; ` : ""}
            ${r[COLS.deps] ? `<b>Depends on:</b> ${esc(r[COLS.deps])} &nbsp; ` : ""}
            ${r[COLS.contact] ? `<b>Contact:</b> ${esc(r[COLS.contact])}` : ""}
          </div>
          ${r[COLS.gotcha] ? `<div class="gotcha"><b>GOTCHA:</b> ${esc(r[COLS.gotcha])}</div>` : ""}
        </div>`;
      }).join("") + `</div></section>`;
  }).join("") || `<div class="state"><h2>No tasks match these filters</h2></div>`;

  const noteHTML = st.past
    ? `<div class="note">This event is completed. The checklist below is the read-only record.</div>`
    : st.wrapup
    ? `<div class="note wrapnote">Event date has passed. Close-out tasks below stay open; pre-event tasks are closed. Type "Completed" in the Events tab Status column to lock this record.</div>`
    : "";

  app.innerHTML = `
    <div class="evbar"><div class="evbar-inner">
      <button class="backbtn" id="back">&lsaquo; ${backTo ? esc(backTo) : "All events & webinars"}</button>
      <div class="ev-head">
        <h2>${esc(title)}</h2>
        <span class="ev-count ${st.cls}">${esc(st.label)}</span>
        <span class="ev-meta">${esc(sub)}</span>
      </div>
      ${st.past ? noteHTML : `<div class="ev-progress">${pr.done}/${pr.total} done<span class="bar"><i style="width:${pr.pct}%"></i></span>${pr.pct}%</div>${noteHTML}`}
      <div class="ev-tools">
        <div class="field"><label for="e-owner">Owner</label><select id="e-owner"><option value="">All owners</option>${owners.map(o=>`<option ${o===evOwner?'selected':''}>${esc(o)}</option>`).join("")}</select></div>
        <div class="field"><label for="e-search">Search</label><input type="search" id="e-search" value="${esc(evQuery)}" placeholder="Task, contact, requirement"></div>
        <button class="btn" id="btn-print" type="button">Print</button>
      </div>
      <div class="chips">${phases.map(p=>`<button class="chip" data-phase="${esc(p)}" aria-pressed="${p===evPhase}">${esc(phaseLabel(p))}</button>`).join("")}</div>
    </div></div>
    <div class="wrap">${boardHTML}</div>`;

  $("back").addEventListener("click", ()=>{ backTo ? goSeries(backTo) : goHome(); });
  $("btn-print").addEventListener("click", ()=>window.print());
  $("e-owner").addEventListener("change", e=>{ evOwner = e.target.value; renderEvent(name, isTpl); });
  $("e-search").addEventListener("input", e=>{ evQuery = e.target.value.trim().toLowerCase(); renderEvent(name, isTpl); });
  app.querySelectorAll(".chip").forEach(ch=>{
    ch.addEventListener("click", ()=>{ evPhase = (evPhase===ch.dataset.phase) ? "" : ch.dataset.phase; renderEvent(name, isTpl); });
  });
  app.querySelectorAll(".row input[type=checkbox]").forEach(cb=>{
    cb.addEventListener("click", e => e.stopPropagation());
    cb.addEventListener("change", ()=>{
      const k = cb.dataset.key;
      if(cb.checked) DONE[k] = true; else delete DONE[k];
      try{ localStorage.setItem("playbook-done", JSON.stringify(DONE)); }catch(e){}
      renderEvent(name, isTpl);
    });
  });
  app.querySelectorAll(".row").forEach(row=>{
    row.addEventListener("click", ()=>{
      const d = document.getElementById(row.dataset.detail);
      if(d) d.classList.toggle("open");
    });
  });
}

/* ---------- clock ---------- */
function tick(){
  const now = new Date();
  $("clock").textContent = now.toLocaleTimeString("en-IN", {hour12:false, timeZone:"Asia/Kolkata"}) + " IST";
  $("today").textContent = now.toLocaleDateString("en-IN", {weekday:"short", day:"numeric", month:"short", year:"numeric", timeZone:"Asia/Kolkata"});
}
tick(); setInterval(tick, 1000);

load();
</script>
</body>
</html>
